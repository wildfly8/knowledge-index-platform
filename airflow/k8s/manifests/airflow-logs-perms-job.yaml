# One-shot: ensure shared Airflow log hostPath is writable by UID 50000 (airflow user).
# Apply before / after helm upgrade when using hostPath logs on k3d.
apiVersion: batch/v1
kind: Job
metadata:
  name: airflow-logs-perms
  namespace: knowledge-airflow
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: chown-logs
          image: busybox:1.36
          command:
            - sh
            - -c
            - mkdir -p /logs && chown -R 50000:0 /logs && chmod -R g+rwX /logs
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: airflow-logs
              mountPath: /logs
      volumes:
        - name: airflow-logs
          hostPath:
            path: /var/lib/knowledge-airflow-logs
            type: DirectoryOrCreate
