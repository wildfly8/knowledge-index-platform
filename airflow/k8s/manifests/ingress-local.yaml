# Local dev Ingress for Airflow web UI via k3s/k3d Traefik (ingressClass: traefik).
# Access: http://localhost:8080/home
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: knowledge-airflow-webserver
  namespace: knowledge-airflow
spec:
  ingressClassName: traefik
  rules:
    - host: localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: knowledge-airflow-webserver
                port:
                  number: 8080
